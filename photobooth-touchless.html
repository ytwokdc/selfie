<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasySelfie Touchless</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@100;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .main-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #000;
        }

        /* Canvas 16:9 */
        .canvas-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #video.mirror {
            transform: scaleX(-1);
        }

        #previewCanvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        #handCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #captureCanvas, #finalCanvas {
            display: none;
        }

        /* Hand Detection Zone */
        .detection-zone {
            position: absolute;
            top: 120px; /* ขยับจากขอบ 120px */
            left: 120px; /* ขยับจากขอบ 120px */
            width: 200px;
            height: 200px;
            border: 5px solid rgba(0, 100, 255, 0.8); /* สีน้ำเงิน */
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 50, 150, 0.2);
            z-index: 15;
        }

        .detection-zone.active {
            border-color: #00ff00; /* เขียวเมื่อตรวจจับได้ */
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }

        .hand-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .detection-text {
            color: white;
            font-size: 14px;
            text-align: center;
            font-weight: 600;
        }

        /* Instructions */
        .instructions {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 600;
            z-index: 5;
            backdrop-filter: blur(10px);
        }

        /* Countdown */
        .countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Anuphan', sans-serif;
            font-weight: 100;
            font-size: 250px;
            color: white;
            text-shadow: 0 0 40px rgba(0,0,0,0.8);
            z-index: 20;
            display: none;
            width: 400px;
            height: 400px;
            border: 8px solid white;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3); /* โปร่งใส ไม่มี blur */
        }

        .countdown.active {
            display: flex;
            animation: pulse 1s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Photo Counter */
        .photo-counter {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            z-index: 5;
            display: none;
        }

        /* Review Screen */
        .review-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            z-index: 30;
            display: none;
            flex-direction: column;
        }

        .review-screen.active {
            display: flex;
        }

        .review-title {
            color: white;
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            padding: 30px;
        }

        .review-photos {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 columns */
            grid-template-rows: 1fr 1fr; /* 2 rows */
            gap: 20px;
            padding: 20px;
            justify-content: center;
            align-items: center;
        }

        .review-photo {
            width: 100%;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .review-photo img {
            width: 100%;
            height: auto;
            display: block;
        }

        .review-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            padding: 30px;
        }

        .review-btn {
            padding: 20px 60px;
            border: none;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .review-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .btn-save {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            color: white;
        }

        .btn-retake {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Loading Overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        /* Start Button */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .start-screen.active {
            display: flex;
        }

        .start-title {
            color: white;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .start-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 24px;
            margin-bottom: 50px;
        }

        .start-button {
            padding: 25px 70px;
            border: none;
            border-radius: 60px;
            font-size: 28px;
            font-weight: 600;
            cursor: pointer;
            background: white;
            color: #667eea;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .start-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }

        .loading-content {
            text-align: center;
            color: white;
        }

        .loading-text {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .loading-dots {
            font-size: 50px;
            letter-spacing: 10px;
        }

        .loading-dots span {
            animation: blink 1.4s infinite;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 20% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        /* Flash Effect */
        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
        }

        .flash.active {
            animation: flashEffect 0.3s ease-out;
        }

        @keyframes flashEffect {
            0% { opacity: 0; }
            50% { opacity: 0.9; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="canvas-wrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="previewCanvas"></canvas>
            <canvas id="overlayCanvas"></canvas>
            <canvas id="handCanvas"></canvas>
        </div>

        <canvas id="captureCanvas"></canvas>
        <canvas id="finalCanvas"></canvas>

        <!-- Color Detection Zone -->
        <div class="detection-zone" id="detectionZone">
            <div class="hand-icon">🟦</div>
            <div class="detection-text">วางป้าย<br>สีน้ำเงินที่นี่</div>
        </div>

        <!-- Countdown -->
        <div class="countdown" id="countdown">5</div>

        <!-- Photo Counter -->
        <div class="photo-counter" id="photoCounter">รูปที่ 1/3</div>

        <!-- Instructions -->
        <div class="instructions" id="instructions">
            วางป้ายสีน้ำเงินในกรอบมุมซ้ายบน เพื่อเริ่มถ่ายรูป
        </div>

        <!-- Review Screen -->
        <div class="review-screen" id="reviewScreen">
            <div class="review-title">รูปของคุณ (4 รูป) 📸</div>
            <div class="review-photos" id="reviewPhotos"></div>
            <div class="review-buttons">
                <button class="review-btn btn-retake" id="retakeBtn">🔄 ถ่ายใหม่</button>
                <button class="review-btn btn-save" id="saveBtn">💾 บันทึก</button>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-content">
                <div class="loading-text">กำลังบันทึกรูปภาพ<br>กรุณารอสักครู่...</div>
                <div class="loading-dots">
                    <span>.</span><span>.</span><span>.</span>
                </div>
            </div>
        </div>

        <!-- Start Screen -->
        <div class="start-screen active" id="startScreen">
            <div class="start-title">📸 EasySelfie Touchless</div>
            <div class="start-subtitle">Photo Booth แบบไร้สัมผัส</div>
            <button class="start-button" id="startButton">🚀 เริ่มใช้งาน</button>
        </div>

        <!-- Flash Effect -->
        <div class="flash" id="flash"></div>
    </div>

    <script>
        // Configuration
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxH1YFbtWakbCdZcSk3WVgqg0YUnvFtotznN-UlnYYBViq0fmxxz-2Kp9cI2AYuTp0vlw/exec';
        const OVERLAY_IMAGE_URL = './images/overlay-landscape.png';
        
        // Canvas size 16:9
        const CANVAS_WIDTH = 1920;
        const CANVAS_HEIGHT = 1080;

        // Color detection zone (120px from edges, 200x200)
        const DETECTION_X = 120;
        const DETECTION_Y = 120;
        const DETECTION_SIZE = 200;

        // State
        let currentState = 'STANDBY';
        let capturedPhotos = [];
        let overlayImage = null;
        let stream = null;
        let detectionLoop = null;
        let lastTriggerTime = 0;
        const TRIGGER_COOLDOWN = 2000; // 2 วินาทีป้องกัน trigger ซ้ำ

        // Elements
        const video = document.getElementById('video');
        const previewCanvas = document.getElementById('previewCanvas');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const handCanvas = document.getElementById('handCanvas');
        const captureCanvas = document.getElementById('captureCanvas');
        const finalCanvas = document.getElementById('finalCanvas');
        
        const previewCtx = previewCanvas.getContext('2d');
        const overlayCtx = overlayCanvas.getContext('2d');
        const handCtx = handCanvas.getContext('2d');
        const captureCtx = captureCanvas.getContext('2d');
        const finalCtx = finalCanvas.getContext('2d');

        const detectionZone = document.getElementById('detectionZone');
        const countdown = document.getElementById('countdown');
        const photoCounter = document.getElementById('photoCounter');
        const instructions = document.getElementById('instructions');
        const reviewScreen = document.getElementById('reviewScreen');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const fingerCount = document.getElementById('fingerCount');

        // Load overlay image
        function loadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = url;
            });
        }

        async function loadOverlayImage() {
            try {
                overlayImage = await loadImage(OVERLAY_IMAGE_URL);
                drawOverlay();
                return true;
            } catch (error) {
                console.error('Cannot load overlay:', error);
                alert('ไม่พบไฟล์ overlay-landscape.png\n\nกรุณาเตรียมไฟล์ขนาด 1920x1080 pixels');
                return false;
            }
        }

        function drawOverlay() {
            if (!overlayImage) return;
            overlayCanvas.width = CANVAS_WIDTH;
            overlayCanvas.height = CANVAS_HEIGHT;
            overlayCanvas.style.display = 'block';
            overlayCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            overlayCtx.drawImage(overlayImage, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        }

        // Color Detection
        function detectBlueColor() {
            // Only detect in STANDBY state
            if (currentState !== 'STANDBY') {
                detectionZone.classList.remove('active');
                return;
            }

            // อ่านข้อมูล pixel จาก video
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = DETECTION_SIZE;
            tempCanvas.height = DETECTION_SIZE;
            const tempCtx = tempCanvas.getContext('2d');

            // คำนวณตำแหน่งบน video
            // เนื่องจาก video มี mirror (scaleX(-1))
            // detection zone อยู่ซ้าย แต่ต้องอ่านจากขวาของ video stream
            const videoRect = video.getBoundingClientRect();
            const scaleX = video.videoWidth / videoRect.width;
            const scaleY = video.videoHeight / videoRect.height;
            
            // อ่านจากด้านขวาของ video (เพราะ mirror)
            const sourceX = video.videoWidth - (DETECTION_X + DETECTION_SIZE) * scaleX;
            const sourceY = DETECTION_Y * scaleY;
            const sourceSize = DETECTION_SIZE * scaleX;

            // วาดส่วนที่ต้องการจาก video
            tempCtx.drawImage(
                video,
                sourceX, sourceY, sourceSize, sourceSize,
                0, 0, DETECTION_SIZE, DETECTION_SIZE
            );

            // อ่าน pixel data
            const imageData = tempCtx.getImageData(0, 0, DETECTION_SIZE, DETECTION_SIZE);
            const pixels = imageData.data;

            // นับจำนวน pixel สีน้ำเงิน
            let bluePixelCount = 0;
            const totalPixels = DETECTION_SIZE * DETECTION_SIZE;

            for (let i = 0; i < pixels.length; i += 4) {
                const r = pixels[i];
                const g = pixels[i + 1];
                const b = pixels[i + 2];

                // ตรวจสอบว่าเป็นสีน้ำเงินหรือไม่
                // น้ำเงิน = B > R และ B > G
                if (b > r + 30 && b > g + 30 && b > 100) {
                    bluePixelCount++;
                }
            }

            // คำนวณเปอร์เซ็นต์
            const bluePercentage = (bluePixelCount / totalPixels) * 100;

            // ถ้าพบสีน้ำเงิน > 30% → trigger (with cooldown)
            const now = Date.now();
            if (bluePercentage > 30 && (now - lastTriggerTime) > TRIGGER_COOLDOWN) {
                detectionZone.classList.add('active');
                lastTriggerTime = now;
                startPhotoSession();
            } else if (bluePercentage > 30) {
                detectionZone.classList.add('active');
            } else {
                detectionZone.classList.remove('active');
            }
        }

        // Detection loop
        function startDetectionLoop() {
            function loop() {
                if (detectionLoop) {
                    detectBlueColor();
                    requestAnimationFrame(loop);
                }
            }
            detectionLoop = true;
            loop();
        }

        function stopDetectionLoop() {
            detectionLoop = false;
        }

        // Start camera
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });
                
                video.srcObject = stream;
                video.classList.add('mirror');
                video.style.display = 'block';
                overlayCanvas.style.display = 'block';

                // รอให้ video พร้อม
                await video.play();

                // เริ่ม color detection loop
                startDetectionLoop();
                
                console.log('✅ Camera started successfully');
                return true;

            } catch (error) {
                console.error('Camera error:', error);
                alert('ไม่สามารถเปิดกล้องได้\n\nกรุณาอนุญาตให้เข้าถึงกล้อง');
                return false;
            }
        }

        // Photo session
        async function startPhotoSession() {
            if (currentState !== 'STANDBY') return;
            
            currentState = 'CAPTURING';
            capturedPhotos = [];
            
            // หยุด color detection
            stopDetectionLoop();
            
            // Hide instructions
            instructions.style.display = 'none';
            detectionZone.style.display = 'none';
            photoCounter.style.display = 'block';

            try {
                // Capture 4 photos
                for (let i = 0; i < 4; i++) {
                    photoCounter.textContent = `รูปที่ ${i + 1}/4`;
                    
                    // Countdown 5 วินาที
                    await showCountdown(5);
                    
                    // Capture
                    const photo = await capturePhoto();
                    capturedPhotos.push(photo);
                    
                    // Short pause
                    await sleep(500);
                }

                // Show review
                showReview();

            } catch (error) {
                console.error('Photo session error:', error);
                resetToStandby();
            }
        }

        async function showCountdown(seconds) {
            for (let i = seconds; i > 0; i--) {
                countdown.textContent = i;
                countdown.classList.add('active');
                await sleep(1000);
                countdown.classList.remove('active');
            }
        }

        // Flash effect
        function showFlash() {
            const flash = document.getElementById('flash');
            flash.classList.add('active');
            setTimeout(() => {
                flash.classList.remove('active');
            }, 300);
        }

        // Shutter sound
        function playShutterSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        async function capturePhoto() {
            // Flash และเสียง
            showFlash();
            playShutterSound();
            
            // Capture from video
            captureCanvas.width = video.videoWidth;
            captureCanvas.height = video.videoHeight;
            
            // Mirror for front camera
            captureCtx.save();
            captureCtx.scale(-1, 1);
            captureCtx.drawImage(video, -video.videoWidth, 0);
            captureCtx.restore();

            const capturedImage = await loadImage(captureCanvas.toDataURL());

            // Create final image with overlay
            finalCanvas.width = CANVAS_WIDTH;
            finalCanvas.height = CANVAS_HEIGHT;

            const scale = Math.max(CANVAS_WIDTH / capturedImage.width, CANVAS_HEIGHT / capturedImage.height);
            const scaledWidth = capturedImage.width * scale;
            const scaledHeight = capturedImage.height * scale;
            const x = (CANVAS_WIDTH - scaledWidth) / 2;
            const y = (CANVAS_HEIGHT - scaledHeight) / 2;

            finalCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            finalCtx.drawImage(capturedImage, x, y, scaledWidth, scaledHeight);
            finalCtx.drawImage(overlayImage, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            return finalCanvas.toDataURL('image/jpeg', 0.9);
        }

        function showReview() {
            currentState = 'REVIEW';
            photoCounter.style.display = 'none';

            // Show 3 photos
            const reviewPhotos = document.getElementById('reviewPhotos');
            reviewPhotos.innerHTML = '';

            capturedPhotos.forEach((photoData, index) => {
                const div = document.createElement('div');
                div.className = 'review-photo';
                
                const img = document.createElement('img');
                img.src = photoData;
                img.alt = `Photo ${index + 1}`;
                
                div.appendChild(img);
                reviewPhotos.appendChild(div);
            });

            reviewScreen.classList.add('active');
        }

        // Save photos
        document.getElementById('saveBtn').addEventListener('click', async () => {
            currentState = 'SAVING';
            loadingOverlay.classList.add('active');

            try {
                // Upload all 4 photos
                await Promise.all(capturedPhotos.map((photoData, index) => {
                    const filename = `photo-${Date.now()}-${index + 1}.jpg`;
                    return uploadToDrive(photoData, filename);
                }));

                loadingOverlay.classList.remove('active');
                alert('บันทึกสำเร็จ! ✅');
                resetToStandby();

            } catch (error) {
                console.error('Save error:', error);
                loadingOverlay.classList.remove('active');
                alert('เกิดข้อผิดพลาด ❌\n\n' + error.message);
                currentState = 'REVIEW';
            }
        });

        // Retake
        document.getElementById('retakeBtn').addEventListener('click', () => {
            resetToStandby();
        });

        // Reset to standby
        function resetToStandby() {
            currentState = 'STANDBY';
            capturedPhotos = [];
            
            reviewScreen.classList.remove('active');
            instructions.style.display = 'block';
            detectionZone.style.display = 'flex';
            photoCounter.style.display = 'none';
            
            // เริ่ม color detection ใหม่
            startDetectionLoop();
        }

        // Upload to Google Drive
        async function uploadToDrive(imageData, filename) {
            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    image: imageData,
                    filename: filename
                })
            });

            const result = await response.json();

            if (!result.success) {
                throw new Error(result.error || 'Upload failed');
            }

            console.log('Uploaded:', filename);
        }

        // Utility
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Initialize
        window.addEventListener('load', async () => {
            // Set canvas sizes
            handCanvas.width = window.innerWidth;
            handCanvas.height = window.innerHeight;

            // Load overlay
            const overlayLoaded = await loadOverlayImage();
            if (!overlayLoaded) {
                document.getElementById('startScreen').classList.remove('active');
                return;
            }

            console.log('✅ System ready, waiting for user to start...');
        });

        // Start button
        document.getElementById('startButton').addEventListener('click', async () => {
            const startScreen = document.getElementById('startScreen');
            
            // Hide start screen
            startScreen.classList.remove('active');

            // ✅ Start camera (with user interaction)
            const cameraStarted = await startCamera();
            if (!cameraStarted) {
                // Show start screen again if failed
                startScreen.classList.add('active');
                return;
            }

            console.log('✅ Touchless Photo Booth Ready!');
        });
    </script>
</body>
</html>
